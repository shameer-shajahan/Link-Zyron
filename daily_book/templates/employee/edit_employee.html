<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Employee</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 30px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 6px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background: #2ecc71;
            color: white;
            border: none;
            font-size: 15px;
            cursor: pointer;
            border-radius: 4px;
        }
        .btn:hover {
            background: #27ae60;
        }
        .note {
            font-size: 13px;
            color: #777;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Edit Employee</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- User Details -->
        <label>Name</label>
        <input type="text" name="name" value="{{ user.name }}" required>

        <label>Email</label>
        <input type="email" name="email" value="{{ user.email }}" required>

        <label>Password</label>
        <input type="password" name="password">
        <div class="note">Leave blank to keep existing password</div>

        <!-- Employee Details -->
        <label>Employee ID</label>
        <input type="text" name="employee_id" value="{{ employee.employee_id }}" required>

        <label>Department</label>
        <input type="text" name="department" value="{{ employee.department }}" required>

        <label>Phone</label>
        <input type="text" name="phone" value="{{ employee.phone }}" required>

        <label>Joining Date</label>
        <input type="date" name="joining_date"
               value="{{ employee.joining_date|date:'Y-m-d' }}" required>

        <button type="submit" class="btn">Update Employee</button>
    </form>
</div>

</body>
</html>
