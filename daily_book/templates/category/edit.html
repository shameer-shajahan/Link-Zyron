{% extends 'master_base.html' %}
{% load static %}

{% block title %} Master {% endblock %}

{% block content %}

<h2>Edit Item Category</h2>

<form method="post">
    {% csrf_token %}

    <label>Category Name</label><br>
    <input 
        type="text" 
        name="name" 
        value="{{ category.name }}" 
        required
    ><br><br>

    <button type="submit">Update</button>
    <a href="{% url 'category_list' %}">Cancel</a>
</form>
{% endblock %}
