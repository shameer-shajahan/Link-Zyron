{% extends 'master_base.html' %}
{% load static %}

{% block title %} Master {% endblock %}

{% block content %}

<h2>Edit Finishing</h2>

<form method="post">
    {% csrf_token %}

    <label>Finishing Name</label><br>
    <input
        type="text"
        name="name"
        value="{{ finishing.name }}"
        required
    >
    <br><br>

    <button type="submit">Update</button>
    <a href="{% url 'finishing_list' %}">Cancel</a>
</form>

{% endblock %}
